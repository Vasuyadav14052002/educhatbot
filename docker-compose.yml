version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: edutrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-edutrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edutrack_secret}
      POSTGRES_DB: ${DB_NAME:-edutrack_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-edutrack}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edutrack_network

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edutrack_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edutrack_network

  # ─────────────────────────────────────────
  # RedisInsight (Redis GUI)
  # ─────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: edutrack_redisinsight
    restart: unless-stopped
    ports:
      - '5540:5540'
    networks:
      - edutrack_network
    depends_on:
      - redis

  # ─────────────────────────────────────────
  # MinIO (S3-compatible local storage)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: edutrack_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - edutrack_network

  # ─────────────────────────────────────────
  # MailHog (Email testing)
  # ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: edutrack_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI
    networks:
      - edutrack_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  edutrack_network:
    driver: bridge
